<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Salida de Gozo · Cuenta atrás</title>
<meta name="description" content="Cuenta atrás de Salida de Gozo.">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="texture" aria-hidden="true"></div>

<main class="stage">

  <header class="frame">
    <span class="eyebrow">Salida de Gozo</span>
    <span class="frame-dates" id="dateRange" aria-hidden="true"></span>
  </header>

  <section class="hero" aria-live="polite">
    <p class="label">Días restantes</p>
    <p class="number" id="daysNumber">336</p>
    <p class="sub" id="targetLine">hasta el 27 de mayo de 2027</p>
  </section>

  <section class="ledger" aria-hidden="true">
    <div class="ledger-row" id="ledgerRow"></div>
    <div class="ledger-meta">
      <span id="elapsedText">29 de 365 días</span>
      <span id="percentText">8%</span>
    </div>
  </section>

</main>

<script src="script.js"></script>
</body>
</html>
