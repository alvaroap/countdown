<!doctype html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Salida de Gozo · Cuenta atrás</title>
<meta name="description" content="Cuenta atrás de Salida de Gozo.">

<link href="https://api.fontshare.com/v2/css?f[]=general-sans@400,500&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css?v=2">
</head>
<body>

<div class="texture" aria-hidden="true"></div>

<main class="stage">

  <header class="frame">
    <span class="eyebrow">Salida de Gozo</span>
    <span class="frame-dates" id="dateRange" aria-hidden="true"></span>
  </header>

  <section class="dial" aria-live="polite">

    <div class="dial-wrap">
      <svg class="dial-svg" viewBox="0 0 280 280" aria-hidden="true">
        <circle class="dial-track" cx="140" cy="140" r="118" fill="none" stroke="#225C67" stroke-width="17" />
        <circle class="dial-progress" id="dialProgress" cx="140" cy="140" r="118" fill="none" stroke="#31FF1E" stroke-width="17" stroke-linecap="round" transform="rotate(-90 140 140)" />
      </svg>
      <div class="dial-center" style="position:absolute; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; text-align:center; gap:2px; padding:0 1rem;">
        <p class="label">Días restantes</p>
        <p class="number" id="daysNumber">336</p>
        <p class="sub" id="targetLine">hasta el 27 de mayo de 2027</p>
      </div>
    </div>

    <p class="dial-meta" id="metaLine">8% - 29 días de 365</p>

  </section>

</main>

<script src="script.js"></script>
</body>
</html>
